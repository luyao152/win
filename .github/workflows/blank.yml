name: 构建x64+arm64（无额外依赖版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      # 🔴 关键步骤：直接下载安装 PowerShell 7，不依赖第三方 Action
      - name: 安装 PowerShell 7
        run: |
          # 下载 PowerShell 7 安装包
          Invoke-WebRequest -Uri "https://github.com/PowerShell/PowerShell/releases/download/v7.4.4/PowerShell-7.4.4-win-x64.msi" -OutFile "PowerShell-7.4.4-win-x64.msi" -UseBasicParsing
          
          # 静默安装
          Start-Process msiexec.exe -Wait -ArgumentList "/i PowerShell-7.4.4-win-x64.msi /qn"
          
          # 添加到环境变量
          echo "C:\Program Files\PowerShell\7" | Out-File $env:GITHUB_PATH -Append

      - name: 解除权限限制（使用 PowerShell 7）
        shell: pwsh
        run: |
          Set-ExecutionPolicy Unrestricted -Force -Scope LocalMachine
          Set-ExecutionPolicy Unrestricted -Force -Scope CurrentUser
          reg add HKLM\SYSTEM\CurrentControlSet\Control\FileSystem /v LongPathsEnabled /t REG_DWORD /d 1 /f

      # ========== x64 构建 ==========
      - name: 构建 x64
        shell: pwsh
        run: |
          $zip = Get-ChildItem ./x64/*.zip | Select-Object -First 1
          Expand-Archive $zip.FullName ./x64 -Force
          cd ./x64
          
          # 运行构建脚本（PowerShell 7 已支持 Get-FileHash）
          cmd /c uup_download_windows.cmd

          # 重命名ISO
          $iso = Get-ChildItem *.iso | Select-Object -First 1
          if($iso) {
            $ver = $iso.Name -replace '.*(\d+\.\d+).*','$1'
            $newName = "Windows_x64_$ver.iso"
            Rename-Item $iso.FullName -NewName $newName -Force
          }

      - name: 上传 x64
        uses: actions/upload-artifact@v4
        with:
          name: Windows_x64
          path: x64/Windows_x64_*.iso

      # ========== arm64 构建 ==========
      - name: 构建 arm64
        shell: pwsh
        run: |
          $zip = Get-ChildItem ./arm64/*.zip | Select-Object -First 1
          Expand-Archive $zip.FullName ./arm64 -Force
          cd ./arm64
          
          # 运行构建脚本
          cmd /c uup_download_windows.cmd

          # 重命名ISO
          $iso = Get-ChildItem *.iso | Select-Object -First 1
          if($iso) {
            $ver = $iso.Name -replace '.*(\d+\.\d+).*','$1'
            $newName = "Windows_arm64_$ver.iso"
            Rename-Item $iso.FullName -NewName $newName -Force
          }

      - name: 上传 arm64
        uses: actions/upload-artifact@v4
        with:
          name: Windows_arm64
          path: arm64/Windows_arm64_*.iso
