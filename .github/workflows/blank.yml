name: UUP 原版 CMD 构建 x64 & arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
  defaults:
    run:
      shell: cmd
      
    steps:
      - name: 检出文件
        uses: actions/checkout@v4

      :: 放开全部权限、长路径、PS执行策略，和你本地一致
      - name: 初始化系统环境
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
          powershell Set-ExecutionPolicy RemoteSigned -Scope Machine -Force

:: ====================== X64 构建 ======================
      - name: 解压 x64 压缩包
        run: |
          cd x64
          for %%a in (*.zip) do tar -xf "%%a"

      - name: 原版 CMD 运行 UUP
        run: |
          cd x64
          uup_download_windows.cmd

      - name: 按版本号重命名 x64 ISO
        run: |
          cd x64
          for %%i in (*.iso) do (
            set "name=%%~ni"
            setlocal enabledelayedexpansion
            for /f "tokens=2 delims=_" %%v in ("!name!") do ren "%%i" "Windows_x64_%%v.iso"
            endlocal
          )

      - name: 上传 x64
        uses: actions/upload-artifact@v4
        with:
          name: Windows_x64
          path: x64\*.iso

:: ====================== ARM64 构建 ======================
      - name: 解压 arm64 压缩包
        run: |
          cd arm64
          for %%a in (*.zip) do tar -xf "%%a"

      - name: 原版 CMD 运行 UUP
        run: |
          cd arm64
          uup_download_windows.cmd

      - name: 按版本号重命名 arm64 ISO
        run: |
          cd arm64
          for %%i in (*.iso) do (
            set "name=%%~ni"
            setlocal enabledelayedexpansion
            for /f "tokens=2 delims=_" %%v in ("!name!") do ren "%%i" "Windows_arm64_%%v.iso"
            endlocal
          )

      - name: 上传 arm64
        uses: actions/upload-artifact@v4
        with:
          name: Windows_arm64
          path: arm64\*.iso
