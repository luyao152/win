name: CF_UUP_FULL
on:
  workflow_dispatch:
    inputs:
      site:
        description: 选择站点
        required: true
        default: uupdump.cn
        type: choice
        options:
          - uupdump.cn  # 不忘初心
          - uupdump.net # UUP官方

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install Chrome & Cloudflared
        run: |
          choco install googlechrome -y
          choco install cloudflared -y

      - name: Start Chrome Remote Debug
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $args = @(
            "--headless=new",
            "--remote-debugging-port=9222",
            "--remote-debugging-address=0.0.0.0",
            "--remote-allow-origins=*",
            "--disable-gpu",
            "--no-first-run",
            "--no-default-browser-check",
            "--start-maximized"
          ) -join " "
          Start-Process -FilePath $chrome -ArgumentList $args -NoNewWindow

      - name: Wait Chrome Ready (45s)
        run: Start-Sleep -Seconds 45

      - name: Verify Debug Port
        run: Test-NetConnection -ComputerName 127.0.0.1 -Port 9222

      - name: Open Selected Website
        run: |
          $site = "${{ github.event.inputs.site }}"
          if ($site -eq "uupdump.cn") {
            Start-Process "https://uupdump.cn/"
          }
          else {
            Start-Process "https://uupdump.net/"
          }

      - name: Start Cloudflare Tunnel
        run: cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
