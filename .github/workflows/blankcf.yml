name: Stable9222
on: workflow_dispatch

jobs:
  main:
    runs-on: windows-latest
    steps:
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Puppeteer
        run: npm install puppeteer

      - name: 启动稳定的调试浏览器（100%能起来）
        run: |
          echo "const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--remote-debugging-port=9222', '--remote-allow-origins=*']
            });
            console.log('Browser OK');
            await new Promise(()=>{});
          })();" > run.js
          node run.js
        shell: pwsh

      - name: 安装并启动隧道
        run: |
          choco install cloudflared -y
          cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
