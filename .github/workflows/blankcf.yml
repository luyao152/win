name: Chrome9222
on: workflow_dispatch

jobs:
  main:
    runs-on: windows-latest
    steps:
      - name: 安装软件
        run: choco install googlechrome cloudflared -y

      - name: 启动Chrome 9222调试端口
        run: |
          $path = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $arg = "--remote-debugging-port=9222 --remote-allow-origins=* --headless=new --disable-gpu"
          Start-Process -FilePath $path -ArgumentList $arg

      - name: 等待启动完成
        run: Start-Sleep -Seconds 30

      - name: 启动隧道转发（正确命令！）
        run: cloudflared tunnel --url http://127.0.0.1:9222
