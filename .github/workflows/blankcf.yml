name: RemoteChrome
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:

      - name: Install Chrome
        run: choco install googlechrome -y

      - name: Start Chrome HEADLESS Remote Debug
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $params = "--remote-debugging-port=9222 --remote-debugging-address=0.0.0.0 --headless=new --disable-gpu"
          Start-Process -FilePath $chrome -ArgumentList $params

      - name: Wait Chrome Ready
        run: Start-Sleep -Seconds 20

      - name: Install & Start Cloudflare Tunnel
        run: |
          choco install cloudflared -y
          cloudflared tunnel --url http://127.0.0.1:9222
