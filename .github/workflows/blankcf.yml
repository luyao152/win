name: Chrome9222
on: workflow_dispatch

jobs:
  main:
    runs-on: windows-latest
    steps:
      - name: 安装必备
        run: choco install googlechrome cloudflared -y

      - name: 启动Chrome 强制监听9222
        run: |
          $path = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $arg = @(
            "--remote-debugging-port=9222",
            "--remote-debugging-address=127.0.0.1",
            "--remote-allow-origins=*",
            "--no-first-run",
            "--no-default-browser-check",
            "--disable-gpu",
            "--background"
          )
          Start-Process $path $arg

      - name: 等待端口就绪
        run: Start-Sleep -Seconds 25

      - name: TCP转发 绕过所有Host拦截
        run: cloudflared access tcp --hostname 0.0.0.0 127.0.0.1:9222
