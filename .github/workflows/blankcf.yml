name: CF_UUP_FINAL
on: workflow_dispatch
permissions: write-all

jobs:
  build:
    runs-on: windows-latest
    steps:

      - name: Install Tools
        run: choco install googlechrome cloudflared -y

      - name: Start Chrome Remote
        run: |
          Start-Process -NoNewWindow "chrome.exe" "--remote-debugging-port=9222 --remote-debugging-password=123456 --disable-gpu https://uupdump.net"

      - name: Start Cloudflare Tunnel
        run: cloudflared tunnel --url http://127.0.0.1:9222
