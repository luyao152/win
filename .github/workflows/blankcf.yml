name: CF_UUP_FULL
on:
  workflow_dispatch:
    inputs:
      choose_site:
        description: 选择站点
        required: true
        default: "1"
        type: choice
        options:
          - 1: 不忘初心 uupdump.cn
          - 2: UUP官方 uupdump.net

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: 安装 Chrome & Cloudflared
        run: choco install googlechrome cloudflared -y
        shell: cmd

      - name: 启动Chrome调试模式
        run: |
          start "" "C:\Program Files\Google\Chrome\Application\chrome.exe" ^
          --headless=new ^
          --remote-debugging-port=9222 ^
          --remote-debugging-address=0.0.0.0 ^
          --remote-allow-origins=* ^
          --disable-gpu ^
          --no-first-run ^
          --no-default-browser-check
        shell: cmd

      - name: 等待Chrome启动 (45秒)
        run: ping -n 46 127.0.0.1 >nul
        shell: cmd

      - name: 检查端口9222
        run: netstat -ano | findstr ":9222"
        shell: cmd

      - name: 打开对应网站
        run: |
          if "%choose_site%"=="1" (
            start "" https://uupdump.cn/
          ) else (
            start "" https://uupdump.net/
          )
        shell: cmd
        env:
          choose_site: ${{ github.event.inputs.choose_site }}

      - name: 启动Cloudflare隧道
        run: cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
        shell: cmd
