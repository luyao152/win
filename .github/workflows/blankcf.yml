name: Chrome9222
on: workflow_dispatch

jobs:
  main:
    runs-on: windows-latest
    steps:
      - name: 安装 Chrome + Cloudflared
        run: choco install googlechrome cloudflared -y

      - name: 启动 Chrome 调试
        run: |
          $path = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $arg = "--remote-debugging-port=9222 --remote-allow-origins=* --headless=new --disable-gpu"
          Start-Process $path $arg

      - name: 等待启动
        run: Start-Sleep -Seconds 15

      - name: 启动隧道（真正删除Host头）
        run: cloudflared tunnel --url http://127.0.0.1:9222 --no-http-host-header
