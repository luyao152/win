name: FinalFix
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install Chrome & Cloudflared
        run: |
          choco install googlechrome cloudflared -y

      - name: Start Chrome Debug
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $args = "--headless=new --remote-debugging-port=9222 --remote-allow-origins=* --disable-gpu"
          Start-Process -FilePath "$chrome" -ArgumentList "$args" -WindowStyle Hidden

      - name: Wait 30s
        run: Start-Sleep -Seconds 30

      - name: Start Tunnel
        run: |
          cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
