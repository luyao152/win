name: CF_UUP_FULL
on:
  workflow_dispatch:
    inputs:
      site:
        description: 选择站点
        required: true
        default: cn
        type: choice
        options:
          - cn: 不忘初心 uupdump.cn
          - net: UUP原版 uupdump.net

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install Chrome & Cloudflared
        run: |
          choco install googlechrome -y
          choco install cloudflared -y

      - name: Start Chrome (有界面 + 可远程调试)
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $args = @(
            "--remote-debugging-port=9222",
            "--remote-allow-origins=*",
            "--disable-gpu",
            "--no-first-run",
            "--no-default-browser-check"
          ) -join " "
          Start-Process -FilePath $chrome -ArgumentList $args -NoNewWindow

      - name: Wait Chrome Ready
        run: Start-Sleep -Seconds 45

      - name: Open Website
        run: |
          $s = "${{ github.event.inputs.site }}"
          if($s -eq "cn"){
            Start-Process "https://uupdump.cn/"
          }else{
            Start-Process "https://uupdump.net/"
          }

      - name: Start Cloudflare Tunnel
        run: cloudflared tunnel --url http://127.0.0.1:9222
