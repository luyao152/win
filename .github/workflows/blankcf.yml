name: 输入版本号自动构建

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: '版本号（如：29576.1000）'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y aria2 cabextract wimtools genisoimage p7zip-full jq curl

      - name: 自动搜索更新ID
        id: search
        run: |
          # 搜索最新版本获取更新ID
          SEARCH_URL="https://uupdump.net/api/listid.php?search=${{ github.event.inputs.build_number }}"
          UPDATE_ID=$(curl -s "$SEARCH_URL" | jq -r '.response.builds[0].updateId')
          echo "找到更新ID: $UPDATE_ID"
          echo "update_id=$UPDATE_ID" >> $GITHUB_OUTPUT

      - name: 拉取并执行脚本
        run: |
          curl -L -o uup.sh "https://uupdump.net/get.php?id=${{ steps.search.outputs.update_id }}&pack=zh-cn&edition=professional;core;corecountryspecific;education;enterprise;professionalworkstation;professionaleducation;coresinglelanguage;iotenterprise"
          chmod +x uup.sh
          cat > ConvertConfig.ini << 'EOF'
          [Config]
          IncludeUpdates=1
          Cleanup=1
          NetFx3Integration=1
          EOF
          ./uup.sh

      - name: 上传 ISO
        uses: actions/upload-artifact@v4
        with:
          name: Windows_${{ github.event.inputs.build_number }}
          path: "*.iso"
