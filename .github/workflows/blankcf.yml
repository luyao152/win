name: ChromeCF
on: workflow_dispatch
jobs:
  c:
    runs-on: windows-latest
    steps:
      - name: Get Chrome
        run: |
          iwr https://storage.googleapis.com/chrome-for-testing-public/125.0.6422.112/win64/chrome-win64.zip -o chrome.zip
          Expand-Archive chrome.zip -DestinationPath . -Force
      - name: Run Chrome Debug
        run: |
          $c = "$pwd\chrome-win64\chrome.exe"
          $a = "--headless=new --remote-debugging-port=9222 --remote-allow-origins=* --no-first-run"
          Start-Process $c $a -WindowStyle Hidden
      - name: Sleep
        run: Start-Sleep -s 30
      - name: CF
        run: |
          choco install cloudflared -y
          cloudflared access tcp --hostname localhost 127.0.0.1:9222
