name: CF
on: workflow_dispatch
permissions: write-all

defaults:
  run:
    shell: cmd

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: env
        run: choco install googlechrome cloudflared -y

      - name: pwd
        run: |
          setlocal enabledelayedexpansion
          set "chars=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
          set "pwd="
          for /l %%i in (1,1,12) do (set /a "r=!random! %% 62" & for %%r in (!r!) do set "pwd=!pwd!!chars:~%%r,1!")
          echo !pwd!>pwd.txt
          endlocal

      - name: chrome
        run: |
          set /p PWD=<pwd.txt
          start "" chrome.exe --remote-debugging-port=9222 --remote-debugging-password=%PWD% --disable-gpu https://uupdump.net https://uup.sbmc.work
          timeout 8 /nobreak

      - name: cf
        run: |
          set /p PWD=<pwd.txt
          taskkill /f /im cloudflared.exe 2>nul
          start /b cloudflared tunnel --url http://127.0.0.1:9222 >cf.log 2>&1
          timeout 20 /nobreak
          findstr https:// cf.log >link.txt
          echo =============================
          echo LINK:
          type link.txt
          echo PWD: %PWD%
          echo =============================

      - name: waitzip
        run: |
          :wait
          timeout 3 /nobreak >nul
          for /f %%a in ('dir /b /od "%USERPROFILE%\Downloads\*.zip" 2^>nul') do set "LZ=%%a" & goto ok
          goto wait
          :ok

      - name: zip
        run: |
          move "%USERPROFILE%\Downloads\%LZ%" uup.zip
          tar -xf uup.zip

      - name: makeiso
        run: |
          for /r %%i in (uup_download_windows.cmd) do call %%i /auto /iso

      - name: rename
        run: for %%i in (*.iso) do ren %%i Windows_UUP.iso

      - name: kill
        run: taskkill /f /im chrome.exe /t & taskkill /f /im cloudflared.exe /t

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: ISO
          path: Windows_UUP.iso
