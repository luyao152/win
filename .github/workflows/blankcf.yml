name: 自定义构建 UUP ISO

on:
  workflow_dispatch:
    inputs:
      # ========== 1. 版本信息（二选一） ==========
      update_id:
        description: '更新ID（如：1528d8b3-043c-4f26-8f5c-18d5d525532c）'
        required: false
        type: string
        default: ''
      build_number:
        description: '版本号（如：29576.1000，与更新ID二选一即可）'
        required: false
        type: string
        default: ''
      
      arch:
        description: '体系结构'
        required: true
        type: choice
        options:
          - amd64
          - arm64
          - x86
        default: 'amd64'
      
      # ========== 2. 语言（中文选项） ==========
      language:
        description: '语言'
        required: true
        type: choice
        options:
          - '中文（简体）'
          - '中文（繁体）'
          - '英语（美国）'
          - '英语（英国）'
          - '日语'
          - '韩语'
          - '德语'
          - '法语'
          - '西班牙语'
          - '俄语'
        default: '中文（简体）'
      
      # ========== 3. SKU版本（中文选项） ==========
      editions:
        description: '要下载的SKU版本（可多选，用分号分隔）'
        required: true
        type: string
        default: '专业版;家庭版'
        # 支持：专业版、家庭版、家庭中文版、教育版、企业版、专业工作站版、专业教育版、家庭单语言版、IoT企业版
      
      # ========== 4. 下载方式 ==========
      download_mode:
        description: '下载方式'
        required: true
        type: choice
        options:
          - '仅下载UUP文件集'
          - '下载并转换为ISO镜像'
          - '下载、添加虚拟升级版本并转换为ISO镜像'
        default: '下载、添加虚拟升级版本并转换为ISO镜像'
      
      # ========== 5. 转换选项 ==========
      include_updates:
        description: '包括更新'
        required: true
        type: boolean
        default: true
      cleanup_mode:
        description: '运行组件清理'
        required: true
        type: boolean
        default: true
      netfx_integration:
        description: '集成 .NET Framework 3.5'
        required: true
        type: boolean
        default: true
      
      # ========== 6. 虚拟升级版本（中文选项） ==========
      virtual_editions:
        description: '虚拟升级版本（可多选，用分号分隔，留空则不添加）'
        required: false
        type: string
        default: '家庭单语言版;专业工作站版;专业教育版;教育版;企业版;企业版多会话;IoT企业版;IoT企业版订阅'

jobs:
  build-iso:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装依赖工具
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 cabextract wimtools mkisofs \
                                   genisoimage p7zip-full jq curl xorriso

      - name: 验证输入（更新ID和版本号二选一）
        id: validate-input
        run: |
          UPDATE_ID="${{ github.event.inputs.update_id }}"
          BUILD_NUM="${{ github.event.inputs.build_number }}"
          
          if [ -z "$UPDATE_ID" ] && [ -z "$BUILD_NUM" ]; then
            echo "错误: 请填写更新ID或版本号（二选一）"
            exit 1
          fi
          
          if [ -n "$UPDATE_ID" ] && [ -n "$BUILD_NUM" ]; then
            echo "注意: 同时填写了更新ID和版本号，将优先使用更新ID"
          fi
          
          echo "验证通过"

      - name: 解析用户输入（中文转英文代码）
        id: parse-inputs
        run: |
          # 语言映射表
          declare -A LANG_MAP=(
            ["中文（简体）"]="zh-cn"
            ["中文（繁体）"]="zh-tw"
            ["英语（美国）"]="en-us"
            ["英语（英国）"]="en-gb"
            ["日语"]="ja-jp"
            ["韩语"]="ko-kr"
            ["德语"]="de-de"
            ["法语"]="fr-fr"
            ["西班牙语"]="es-es"
            ["俄语"]="ru-ru"
          )
          SELECTED_LANG="${{ github.event.inputs.language }}"
          LANG_CODE="${LANG_MAP[$SELECTED_LANG]}"
          echo "language_code=$LANG_CODE" >> $GITHUB_OUTPUT
          echo "语言: $SELECTED_LANG -> $LANG_CODE"
          
          # SKU版本映射表（中文 -> 英文代码）
          declare -A SKU_MAP=(
            ["专业版"]="professional"
            ["家庭版"]="core"
            ["家庭中文版"]="corecountryspecific"
            ["教育版"]="education"
            ["企业版"]="enterprise"
            ["专业工作站版"]="professionalworkstation"
            ["专业教育版"]="professionaleducation"
            ["家庭单语言版"]="coresinglelanguage"
            ["IoT企业版"]="iotenterprise"
          )
          
          # 解析用户输入的SKU版本（中文，分号分隔）
          EDITIONS_CN="${{ github.event.inputs.editions }}"
          EDITIONS_LIST=""
          IFS=';' read -ra EDITIONS_ARRAY <<< "$EDITIONS_CN"
          for edition_cn in "${EDITIONS_ARRAY[@]}"; do
            edition_cn=$(echo "$edition_cn" | xargs)
            edition_code="${SKU_MAP[$edition_cn]}"
            if [ -n "$edition_code" ]; then
              if [ -z "$EDITIONS_LIST" ]; then
                EDITION
