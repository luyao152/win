name: RemoteBrowser
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:

      - name: 安装 Chrome
        run: choco install googlechrome -y

      - name: 安装 Cloudflare
        run: choco install cloudflared -y

      - name: 启动 Chrome 远程调试
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $params = "--remote-debugging-port=9222 --remote-allow-origins=* --headless=new --disable-gpu"
          Start-Process -FilePath "$chrome" -ArgumentList "$params"

      - name: 等待启动
        run: Start-Sleep -Seconds 10

      - name: 启动隧道
        run: cloudflared tunnel --url http://127.0.0.1:9222
