name: CF_UUP_FULL
on:
  workflow_dispatch:
    inputs:
      choose_site:
        description: 站点选择
        required: true
        default: "1"
        type: choice
        options:
          - 1: 不忘初心 uupdump.cn
          - 2: UUPDump 原版 uupdump.net

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Install Chrome & Cloudflared
        run: choco install googlechrome cloudflared -y
        shell: cmd

      - name: Start Chrome Debug (Pure CMD)
        run: |
          start "" "C:\Program Files\Google\Chrome\Application\chrome.exe" ^
          --headless=new ^
          --remote-debugging-port=9222 ^
          --remote-debugging-address=0.0.0.0 ^
          --remote-allow-origins=* ^
          --disable-gpu ^
          --no-first-run ^
          --no-default-browser-check
        shell: cmd

      - name: Wait Chrome Ready
        run: timeout /t 45 /nobreak >nul
        shell: cmd

      - name: Check Port 9222
        run: netstat -ano | findstr ":9222"
        shell: cmd

      - name: Open Select Site
        run: |
          if "%choose_site%"=="1" (
            start "" https://uupdump.cn/
          ) else (
            start "" https://uupdump.net/
          )
        shell: cmd
        env:
          choose_site: ${{ github.event.inputs.choose_site }}

      - name: Start Cloudflare Tunnel
        run: cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
        shell: cmd
