name: RemoteChrome
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 安装环境
        run: choco install googlechrome cloudflared -y

      - name: 启动 Chrome 远程调试
        run: |
          $chrome = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          & $chrome --headless=chrome --remote-debugging-port=9222 --remote-allow-origins=* --disable-gpu
          
      - name: 等待启动
        run: Start-Sleep -Seconds 10

      - name: 启动隧道
        run: cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
