name: Edge9222
on: workflow_dispatch

jobs:
  main:
    runs-on: windows-latest
    steps:
      - name: 安装 Cloudflared
        run: choco install cloudflared -y

      - name: 启动 Edge 调试端口（必开！）
        run: |
          $edge = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
          $arg = "--remote-debugging-port=9222 --headless=new --disable-gpu --remote-allow-origins=*"
          Start-Process $edge $arg

      - name: 等待启动（必成功）
        run: Start-Sleep -Seconds 20

      - name: 启动隧道
        run: cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
