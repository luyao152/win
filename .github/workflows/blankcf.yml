name: Chrome_DevTools_FINAL
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install Dependencies
        run: choco install googlechrome cloudflared -y

      - name: Start Chrome Remote Debug (Background)
        run: |
          Start-Process `
            -FilePath "C:\Program Files\Google\Chrome\Application\chrome.exe" `
            -ArgumentList "--headless=chrome --remote-debugging-port=9222 --remote-allow-origins=* --disable-gpu --no-first-run --no-default-browser-check" `
            -NoNewWindow

      - name: Wait for Chrome to Initialize
        run: Start-Sleep -Seconds 30

      - name: Verify Port 9222 is Open
        run: |
          for ($i=1; $i -le 10; $i++) {
            $result = Test-NetConnection -ComputerName 127.0.0.1 -Port 9222 -InformationLevel Quiet
            if ($result) {
              Write-Host "Port 9222 is open!"
              break
            }
            Write-Host "Waiting for port 9222... ($i/10)"
            Start-Sleep -Seconds 5
          }
          if (-not $result) {
            Write-Error "FATAL: Port 9222 never opened. Chrome failed to start."
            exit 1
          }

      - name: Start Cloudflare Tunnel
        run: cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
