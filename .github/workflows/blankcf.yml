name: CF穿透远程浏览器｜UUP+不忘初心｜自动抓随机下载
on:
  workflow_dispatch

permissions:
  contents: write

defaults:
  run:
    shell: cmd

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 480

    steps:
      - name: 基础环境配置
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /d 1 /f
          powershell "Set-ExecutionPolicy Bypass -Scope CurrentUser -Force"

      - name: 生成浏览器连接密码
        run: |
          powershell "$pwd = -join((65..90)+(97..122)+(48..57)|Get-Random -Count 12|%{[char]$_}) ; $pwd | Out-File pwd.txt"

      - name: 安装 Cloudflared
        run: choco install cloudflared -y

      - name: 启动Chrome 双UUP页面
        run: |
          @echo off
          set /p PWD=<pwd.txt
          start "" chrome.exe ^
          --remote-debugging-port=9222 ^
          --remote-debugging-password=%PWD% ^
          --no-first-run --no-default-browser-check ^
          "https://uupdump.net" ^
          "https://uup.sbmc.work"
          timeout /t 5 /nobreak

      - name: 启动CF穿透并打印访问链接
        run: |
          @echo off
          :: 后台启动隧道
          start "" cloudflared tunnel --url http://127.0.0.1:9222 > cf.log 2>&1
          timeout /t 15 /nobreak
          :: 抓取官方临时域名
          powershell "Get-Content cf.log | Select-String 'https://.*\.trycloudflare\.com' | Select-Object -First 1 | ForEach-Object {$_.Line} | Out-File link.txt"
          echo ==============================================
          echo ✅ 远程浏览器访问地址：
          type link.txt
          echo 🔑 连接密码：%PWD%
          echo ==============================================
          echo 操作：
          echo 1.复制上面HTTPS链接打开
          echo 2.输入密码接管云端浏览器
          echo 3.自选UUP/不忘初心 手动勾选下载
          echo ==============================================

      - name: 等待下载 & 自动捕获最新ZIP(无视命名)
        run: |
          @echo off
          :wait
          timeout /t 2 /nobreak >nul
          for /f "delims=" %%a in ('dir /b /od /a-d "%USERPROFILE%\Downloads\*.zip" 2^>nul') do set "LAST_ZIP=%%a"
          if not defined LAST_ZIP goto wait

      - name: 转移压缩包
        run: move "%USERPROFILE%\Downloads\%LAST_ZIP%" uup_new.zip

      - name: 解压
        run: tar -xf uup_new.zip

      - name: 运行UUP打包生成ISO
        run: uup_download_windows.cmd /auto /iso

      - name: ISO重命名
        run: |
          setlocal enabledelayedexpansion
          for %%i in (*.iso) do ren "%%i" "Windows_UUP_%%~nxi"
          endlocal

      - name: 清理垃圾
        run: del /q *.zip *.esd *.wim *.cmd cf.log link.txt pwd.txt

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: UUP_不忘初心_穿透全自动成品
          path: *.iso
