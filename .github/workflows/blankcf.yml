name: 一键构建 UUP ISO

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Windows 版本号（例：29576.1000 或 22621）'
        required: true
        type: string
        default: '22621'
      arch:
        description: '架构'
        required: true
        type: choice
        options:
          - amd64
          - arm64
        default: 'amd64'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y aria2 cabextract wimtools genisoimage p7zip-full jq curl

      - name: 获取更新ID
        id: get
        run: |
          API_URL="https://uupdump.net/api/get.php?id=${{ github.event.inputs.build_number }}&arch=${{ github.event.inputs.arch }}"
          UPDATE_ID=$(curl -s "$API_URL" | jq -r '.updateId')
          echo "update_id=$UPDATE_ID" >> $GITHUB_OUTPUT
          echo "找到更新ID: $UPDATE_ID"

      - name: 下载脚本（包含所有SKU版本）
        run: |
          # 所有SKU版本（专业版、家庭版、家庭中文版、教育版、企业版、专业工作站版、专业教育版、家庭单语言版、IoT企业版）
          ALL_SKUS="professional;core;corecountryspecific;education;enterprise;professionalworkstation;professionaleducation;coresinglelanguage;iotenterprise"
          
          curl -L -o uup.sh "https://uupdump.net/get.php?id=${{ steps.get.outputs.update_id }}&pack=zh-cn&edition=$ALL_SKUS"
          chmod +x uup.sh

      - name: 配置转换选项（全部开启）
        run: |
          cat > ConvertConfig.ini << 'EOF'
          [Config]
          IncludeUpdates=1
          Cleanup=1
          NetFx3Integration=1
          EOF

      - name: 执行下载、添加虚拟升级版本、转换为ISO
        run: |
          ./uup.sh

      - name: 上传ISO
        uses: actions/upload-artifact@v4
        with:
          name: Windows_${{ github.event.inputs.build_number }}_${{ github.event.inputs.arch }}
          path: "*.iso"
