name: CF
on: workflow_dispatch
permissions: write-all

defaults:
  run:
    shell: cmd

jobs:
  build:
    runs-on: windows-latest
    steps:

      - name: Install
        run: choco install googlechrome cloudflared -y

      - name: Start
        run: start /b chrome.exe --remote-debugging-port=9222 --remote-debugging-password=123456 --disable-gpu https://uupdump.net & timeout 8 & start /b cloudflared tunnel --url http://127.0.0.1:9222 & timeout 300

      - name: Wait
        run: timeout 300

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: UUP_ISO
          path: *.iso
