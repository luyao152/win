name: CF_UUP_FINAL
on: workflow_dispatch
permissions: write-all

jobs:
  build:
    runs-on: windows-latest
    steps:

      - name: Install Chrome & Cloudflared
        run: choco install googlechrome cloudflared -y

      - name: Start Chrome Remote Debug
        run: |
          $chromePath = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $args = "--remote-debugging-port=9222 --remote-debugging-password=123456 --disable-gpu https://uupdump.net"
          Start-Process -FilePath $chromePath -ArgumentList $args

      - name: Start Cloudflare Tunnel
        run: cloudflared tunnel --url http://127.0.0.1:9222
