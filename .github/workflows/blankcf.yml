name: CF穿透浏览器
on:
  workflow_dispatch

permissions:
  contents: write

defaults:
  run:
    shell: cmd

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 480

    steps:
      - name: Install
        run: choco install googlechrome cloudflared -y

      - name: Start
        run: start /b chrome.exe --remote-debugging-port=9222 --remote-debugging-password=123456 --disable-gpu https://uupdump.net & timeout 10 & start /b cloudflared tunnel --url http://127.0.0.1:9222 & timeout 600

      - name: GetZip
        run: for /f "delims=" %%a in ('dir /b /od "%USERPROFILE%\Downloads\*.zip"') do move "%USERPROFILE%\Downloads\%%a" uup.zip

      - name: Unzip
        run: tar -xf uup.zip

      - name: MakeISO
        run: for /r %%i in (uup_download_windows.cmd) do call "%%i" /auto /iso

      - name: Rename
        run: ren *.iso Windows.iso

      - name: Clean
        run: taskkill /f /im chrome.exe /t & taskkill /f /im cloudflared.exe /t

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Windows_ISO
          path: Windows.iso
