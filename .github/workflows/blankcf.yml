name: CF穿透远程浏览器｜UUP+不忘初心｜纯CMD无语法错误版
on:
  workflow_dispatch

permissions:
  contents: write

defaults:
  run:
    shell: cmd

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 480

    steps:
      - name: 基础环境 + 安装依赖
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /d 1 /f
          choco install googlechrome cloudflared -y

      - name: 纯CMD生成12位随机密码
        run: |
          @echo off
          setlocal enabledelayedexpansion
          set "chars=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
          set "pwd="
          for /l %%i in (1,1,12) do (
            set /a "r=!random! %% 62"
            for %%r in (!r!) do set "pwd=!pwd!!chars:~%%r,1!"
          )
          echo !pwd! > pwd.txt
          endlocal

      - name: 启动Chrome远程调试双页面
        run: |
          @echo off
          set /p PWD=<pwd.txt
          start "" "C:\Program Files\Google\Chrome\Application\chrome.exe" ^
          --remote-debugging-port=9222 ^
          --remote-debugging-password=%PWD% ^
          --no-first-run --no-default-browser-check ^
          --disable-gpu --disable-software-rasterizer ^
          "https://uupdump.net" ^
          "https://uup.sbmc.work"
          timeout /t 8 /nobreak

      - name: 启动CF隧道 + 纯CMD抓取域名 + 后台保活
        run: |
          @echo off
          set /p PWD=<pwd.txt
          taskkill /im cloudflared.exe /f 2>nul
          start /b "" cloudflared tunnel --url http://127.0.0.1:9222 > cf.log 2>&1
          timeout /t 20 /nobreak
          findstr /r "https://.*\.trycloudflare\.com" cf.log > link.tmp
          for /f "delims=" %%a in (link.tmp) do echo %%a>link.txt
          del /q link.tmp
          echo @echo off > keepalive.bat
          echo :loop >> keepalive.bat
          echo timeout /t 60 /nobreak ^>nul >> keepalive.bat
          echo tasklist ^| findstr cloudflared ^>nul || start /b cloudflared tunnel --url http://127.0.0.1:9222 ^>cf.log 2^>&1 >> keepalive.bat
          echo goto loop >> keepalive.bat
          start /b cmd /c keepalive.bat
          echo ==============================================
          echo ✅ 远程浏览器地址：
          type link.txt
          echo 🔑 连接密码：%PWD%
          echo 🟢 CF隧道已开启自动保活
          echo ==============================================

      - name: 纯CMD限时等待ZIP下载
        run: |
          @echo off
          set "wait_time=0"
          :wait
          timeout /t 3 /nobreak >nul
          for /f "delims=" %%a in ('dir /b /od /a-d "%USERPROFILE%\Downloads\*.zip" 2^>nul') do (
            set "LAST_ZIP=%%a"
            goto gotfile
          )
          set /a wait_time+=3
          if %wait_time% gtr 900 exit 1
          goto wait
          :gotfile

      - name: 转移压缩包
        run: move "%USERPROFILE%\Downloads\%LAST_ZIP%" uup_new.zip

      - name: 解压文件
        run: tar -xf uup_new.zip

      - name: 纯CMD递归运行UUP打包ISO
        run: |
          @echo off
          for /r %%i in (uup_download_windows.cmd) do (
            cd /d "%%~dpi"
            call "%%~nxi" /auto /iso
          )

      - name: 批量重命名ISO
        run: |
          setlocal enabledelayedexpansion
          for %%i in (*.iso) do ren "%%i" "Windows_UUP_%%~nxi"
          endlocal

      - name: 结束全部后台进程
        run: |
          taskkill /im chrome.exe /f /t 2>nul
          taskkill /im cloudflared.exe /f /t 2>nul
          taskkill /im cmd.exe /fi "windowtitle eq keepalive" /f 2>nul

      - name: 清理临时垃圾
        run: del /q *.zip *.esd *.wim *.cmd cf.log link.txt pwd.txt keepalive.bat 2>nul

      - name: 上传成品ISO
        uses: actions/upload-artifact@v4
        with:
          name: UUP_不忘初心_纯CMD穿透成品
          path: *.iso
