name: Chrome9222
on: workflow_dispatch

jobs:
  main:
    runs-on: windows-latest
    steps:
      - name: 安装必备
        run: choco install googlechrome cloudflared -y

      - name: 启动Chrome 9222调试端口（前台不挂起）
        run: |
          $path = "C:\Program Files\Google\Chrome\Application\chrome.exe"
          $arg = @(
            "--remote-debugging-port=9222",
            "--remote-allow-origins=*",
            "--disable-gpu",
            "--no-first-run",
            "--no-default-browser-check",
            "--disable-background-networking",
            "--disable-background-timer-throttling",
            "--disable-renderer-backgrounding"
          ) -join " "
          Start-Process -FilePath $path -ArgumentList $arg -NoNewWindow

      - name: 等待端口完全就绪（延长到60秒）
        run: Start-Sleep -Seconds 60

      - name: 启动隧道（强制Host为127.0.0.1）
        run: cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
