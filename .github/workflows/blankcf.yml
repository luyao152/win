name: Stable9222
on: workflow_dispatch

jobs:
  main:
    runs-on: windows-latest
    steps:
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 一次性启动浏览器 + 隧道（保证端口在线）
        run: |
          npm install puppeteer
          echo "const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--remote-debugging-port=9222', '--remote-allow-origins=*']
            });
            console.log('Browser OK');
            await new Promise(()=>{});
          })();" > run.js

          choco install cloudflared -y
          Start-Process node -ArgumentList "run.js" -NoNewWindow
          Start-Sleep -Seconds 15
          cloudflared tunnel --url http://127.0.0.1:9222 --http-host-header 127.0.0.1
        shell: pwsh
